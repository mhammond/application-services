[package]
name = "tracing-support"
version = "0.1.0"
edition = "2021"

[features]
testing = [ "tracing-subscriber/env-filter" ]

[dependencies]
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "std", "tracing-log"] }

[dev-dependencies]
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt", "std", "tracing-log"] }
